<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentShare — Modo Offline</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #ecf0f1;
            --accent: #8b5cf6;
            --primary: #6366f1;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
            max-width: 400px;
        }
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>¡Estás Offline!</h1>
    <p>Parece que perdiste la conexión a internet. RentShare sigue funcionando y sincronizará tus cambios cuando regreses.</p>
    <button class="btn" onclick="window.location.reload()">Reintentar conexión</button>
</body>
</html>
