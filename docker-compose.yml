version: '3.8'

services:
  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/rentshare?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=rentshare
      - SPRING_DATASOURCE_PASSWORD=rentshare
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - rentshare-net

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - rentshare-net

  mysql-db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=rentshare
      - MYSQL_USER=rentshare
      - MYSQL_PASSWORD=rentshare
      - MYSQL_ROOT_PASSWORD=rentshare_root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rentshare-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prentshare_root"]
      timeout: 20s
      retries: 10

networks:
  rentshare-net:
    driver: bridge

volumes:
  db_data:
