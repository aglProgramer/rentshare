# ===========================
# RentShare - Configuración
# ===========================

# Puerto (Render asigna uno dinámico)
server.port=${PORT:8080}

# Nombre de la aplicación
spring.application.name=rentshare-api

# ===========================
# Base de Datos (PostgreSQL via Entorno)
# Fallback local usando H2 si no se define SPRING_DATASOURCE_URL
# ===========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:rentsharedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Consola H2 (acceder en: http://localhost:8080/h2-console solo en local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Asegura que data.sql solo corra si usas h2 y diferido (para local)
spring.sql.init.mode=never

# ===========================
# Datos iniciales (data.sql)
# ===========================
spring.sql.init.mode=always

# ===========================
# Logging
# ===========================
logging.level.com.rentshare=DEBUG
logging.level.org.springframework.web=INFO

