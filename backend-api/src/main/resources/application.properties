# ===========================
# RentShare - Configuración
# ===========================

# Puerto del servidor
server.port=8080

# Nombre de la aplicación
spring.application.name=rentshare-api

# ===========================
# Base de Datos H2 (Desarrollo)
# ===========================
spring.datasource.url=jdbc:h2:mem:rentsharedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2 (acceder en: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hace que data.sql se ejecute DESPUÉS de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true

# ===========================
# Datos iniciales (data.sql)
# ===========================
spring.sql.init.mode=always

# ===========================
# Logging
# ===========================
logging.level.com.rentshare=DEBUG
logging.level.org.springframework.web=INFO

