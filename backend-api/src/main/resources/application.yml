spring:
  application:
    name: rentshare-api
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:rentshare;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: 8080
  error:
    include-message: always

app:
  cors:
    allowed-origins: "http://localhost:5500,http://127.0.0.1:5500"
